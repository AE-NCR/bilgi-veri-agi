<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgi-Veri Ağı</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
    <style>
        :root {
            --bg-color: #0a0f0d;
            --card-bg: #121a16;
            --primary: #1b5e20; /* Koyu Yeşil */
            --secondary: #0288d1; /* Mavi */
            --text-main: #ffffff;
            --text-dim: #b0bec5;
            --transition: all 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navbar & Hamburger */
        nav {
            background: rgba(10, 15, 13, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--primary);
        }

        .logo { font-weight: 700; font-size: 1.5rem; color: var(--primary); }

        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 25px; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 400;
            transition: var(--transition);
        }
        .nav-links a:hover { color: var(--secondary); }

        .hamburger { display: none; cursor: pointer; font-size: 1.8rem; }

        /* Main Content */
        main { margin-top: 100px; padding: 2rem 5%; max-width: 1200px; margin-left: auto; margin-right: auto; }

        .section-title { font-weight: 700; margin-bottom: 2rem; border-left: 5px solid var(--primary); padding-left: 15px; }

        /* Blog Cards */
        .blog-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }

        .post-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #1a2e23;
            transition: var(--transition);
            opacity: 0; transform: translateY(20px); /* Efekt için başlangıç */
        }

        .post-card.visible { opacity: 1; transform: translateY(0); }

        .post-card:hover {
            border-color: var(--secondary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transform: scale(1.02);
        }

        .post-card h3 { font-weight: 700; margin-bottom: 0.5rem; color: var(--primary); }
        .post-card p { color: var(--text-dim); margin-bottom: 1rem; }

        .btn-download {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn-download:hover { background: var(--secondary); }

        /* Mobile View */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: var(--bg-color);
                padding: 2rem;
                text-align: center;
            }
            .nav-links.active { display: flex; }
            .nav-links li { margin: 1rem 0; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Bilgi-Veri Ağı</div>
        <div class="hamburger" id="hamburger">☰</div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Ana sayfa</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">İçerik</a></li>
            <li><a href="iletisim.html">Hakkında && İletişim</a></li>
        </ul>
    </nav>

    <main>
        <h2 class="section-title">Son Paylaşımlar</h2>
        <div id="blog-wrapper" class="blog-container">
            </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
