<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videolar - Bilgi-Veri Ağı</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
    <style>
        :root {
            --bg-color: #0a0f0d;
            --card-bg: #121a16;
            --primary: #1b5e20;
            --secondary: #0288d1;
            --text-main: #ffffff;
            --text-dim: #b0bec5;
            --transition: all 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            background: rgba(10, 15, 13, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--primary);
        }

        .logo { font-weight: 700; font-size: 1.5rem; color: var(--primary); }

        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 25px; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 400;
            transition: var(--transition);
        }
        .nav-links a:hover { color: var(--secondary); }
        .nav-links .active-link { color: var(--primary); font-weight: 700; }

        .hamburger { display: none; cursor: pointer; font-size: 1.8rem; }

        main { margin-top: 130px; padding: 2rem 5%; max-width: 800px; margin-left: auto; margin-right: auto; }

        .section-title { font-weight: 700; margin-bottom: 1.5rem; border-left: 5px solid var(--primary); padding-left: 15px; }

        .info-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #1a2e23;
            margin-bottom: 2.5rem;
            transition: var(--transition);
        }

        .info-card:hover { border-color: var(--secondary); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .info-card p { color: var(--text-dim); font-size: 1.05rem; }
        .contact-method { margin-top: 15px; font-size: 1.05rem; }
        .contact-method strong { color: var(--primary); }
        .contact-method a { color: var(--text-main); text-decoration: none; border-bottom: 1px dashed var(--secondary); transition: var(--transition); }
        .contact-method a:hover { color: var(--secondary); }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: var(--bg-color);
                padding: 2rem;
                text-align: center;
            }
            .nav-links.active { display: flex; }
            .nav-links li { margin: 1rem 0; margin-left: 0; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Bilgi-Veri Ağı</div>
        <div class="hamburger" id="hamburger">☰</div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html" class="active-link"><i class="fa-solid fa-house"></i> Ana sayfa</a></li>
            <li><a href="indir.html"><i class="fa-solid fa-download"></i> İndirmeler</a></li>
            <li><a href="videolar.html"><i class="fa-solid fa-video"></i> Videolar</a></li>
            <li><a href="iletisim.html"><i class="fa-solid fa-circle-info"></i> Hakkında && İletişim</a></li>
        </ul>
    </nav>

    <main>
        <h2 class="section-title">Videolar</h2>
        <!-- ARAMA KUTUSU BURAYA EKLENDİ -->
    <div class="search-container">
        <input type="text" id="video-search" class="search-input" placeholder="Video adı ara...">

    </div>
    
    <!-- JS'in videoları basacağı kapsayıcı -->
    <div id="video-container"></div>
    </main>
        
        <!-- JS'in videoları basacağı kapsayıcı buraya eklendi -->
        <div id="video-container"></div>
        
    </main>

    <script src="main.js"></script>
</body>
</html>
