<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakkında & İletişim - Bilgi-Veri Ağı</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
    <style>
        :root {
            --bg-color: #0a0f0d;
            --card-bg: #121a16;
            --primary: #1b5e20; /* Koyu Yeşil */
            --secondary: #0288d1; /* Mavi */
            --text-main: #ffffff;
            --text-dim: #b0bec5;
            --transition: all 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navbar & Hamburger */
        nav {
            background: rgba(10, 15, 13, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--primary);
        }

        .logo { font-weight: 700; font-size: 1.5rem; color: var(--primary); }

        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 25px; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 400;
            transition: var(--transition);
        }
        .nav-links a:hover { color: var(--secondary); }

        .hamburger { display: none; cursor: pointer; font-size: 1.8rem; }

        /* Main Content Düzeni */
        main { 
            margin-top: 120px; 
            padding: 2rem 5%; 
            max-width: 800px; /* Okunabilirlik için içeriği biraz daralttık */
            margin-left: auto; 
            margin-right: auto; 
        }

        .section-title { 
            font-weight: 700; 
            margin-bottom: 1.5rem; 
            border-left: 5px solid var(--primary); 
            padding-left: 15px; 
        }

        /* Hakkında ve İletişim Kutuları */
        .info-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #1a2e23;
            margin-bottom: 2.5rem; /* İki bölüm arası boşluk */
            transition: var(--transition);
        }

        .info-card:hover {
            border-color: var(--secondary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .info-card p { 
            color: var(--text-dim); 
            font-size: 1.05rem;
        }

        /* İletişim Satırları Düzeni */
        .contact-method {
            margin-top: 15px;
            font-size: 1.05rem;
        }

        .contact-method strong {
            color: var(--primary);
        }

        .contact-method a {
            color: var(--text-main);
            text-decoration: none;
            border-bottom: 1px dashed var(--secondary);
            transition: var(--transition);
        }

        .contact-method a:hover {
            color: var(--secondary);
        }

        /* Mobile View (Birebir index.html ile aynı mobil uyum) */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: var(--bg-color);
                padding: 2rem;
                text-align: center;
            }
            .nav-links.active { display: flex; }
            .nav-links li { margin: 1rem 0; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Bilgi-Veri Ağı</div>
        <div class="hamburger" id="hamburger">☰</div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Ana sayfa</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">İçerik</a></li>
            <li><a href="iletisim.html">Hakkında && İletişim</a></li>
        </ul>
    </nav>

    <main>
        <h2 class="section-title">Hakkında</h2>
        <div class="info-card">
            <p>deneme bir yazı sonradan düzenlencektir</p>
        </div>

        <h2 class="section-title">İletişim</h2>
        <div class="info-card">
            <div class="contact-method">
                <strong>Email adresi:</strong> 
                <a href="mailto:bilgi-veri.bristle995@aleeas.com">bilgi-veri.bristle995@aleeas.com</a>
            </div>
            <div class="contact-method">
                <strong>Github linki:</strong> 
                <a href="https://www.web.com" target="_blank">www.web.com</a>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
